<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HealthyEat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4"><i class="fas fa-leaf text-success"></i> HealthyEat</h2>
                        <h4 class="text-center mb-4">Register</h4>
                        <ul class="nav nav-tabs mb-3" id="registerTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="subscriber-tab" data-bs-toggle="tab" data-bs-target="#subscriber" type="button" role="tab" aria-controls="subscriber" aria-selected="true">Subscriber</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="professional-tab" data-bs-toggle="tab" data-bs-target="#professional" type="button" role="tab" aria-controls="professional" aria-selected="false">Professional</button>
                            </li>
                        </ul>
                        <div class="tab-content" id="registerTabContent">
                            <div class="tab-pane fade show active" id="subscriber" role="tabpanel" aria-labelledby="subscriber-tab">
                                <form id="subscriberForm">
                                    <div class="mb-3">
                                        <label for="subFullName" class="form-label">Full Name</label>
                                        <input type="text" class="form-control" id="subFullName" placeholder="Enter your full name" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="subEmail" class="form-label">Email Address</label>
                                        <input type="email" class="form-control" id="subEmail" placeholder="Enter your email" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="subPassword" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="subPassword" placeholder="Create a password" required>
                                    </div>
                                    <div id="subErrorAlert" class="alert alert-danger d-none" role="alert"></div>
                                    <button type="submit" class="btn btn-success w-100">
                                        <i class="fas fa-user-plus"></i> Register as Subscriber
                                    </button>
                                </form>
                            </div>
                            <div class="tab-pane fade" id="professional" role="tabpanel" aria-labelledby="professional-tab">
                                <form id="professionalForm">
                                    <div class="mb-3">
                                        <label for="profFullName" class="form-label">Full Name</label>
                                        <input type="text" class="form-control" id="profFullName" placeholder="Enter your full name" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="profEmail" class="form-label">Email Address</label>
                                        <input type="email" class="form-control" id="profEmail" placeholder="Enter your email" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="profPassword" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="profPassword" placeholder="Create a password" required>
                                    </div>
                                    <div class="alert alert-info">
                                        <i class="fas fa-info-circle"></i> Professional accounts require admin approval before activation.
                                    </div>
                                    <div id="profErrorAlert" class="alert alert-danger d-none" role="alert"></div>
                                    <button type="submit" class="btn btn-primary w-100">
                                        <i class="fas fa-user-md"></i> Register as Professional
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="text-center mt-3">
                            <a href="login.html">Already have an account? Login here</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
