<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base - HealthyEat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand text-success fw-bold" href="index.html"><i class="fas fa-leaf"></i> HealthyEat</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto" id="navMenu"></ul>
                <ul class="navbar-nav" id="navAuth"></ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="text-center mb-4"><i class="fas fa-book-open text-success"></i> Health Knowledge</h1>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="Search articles...">
                </div>
            </div>
            <div class="col-md-4">
                <select class="form-select" id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Nutrition">Nutrition</option>
                    <option value="Diet Tips">Diet Tips</option>
                    <option value="Weight Loss">Weight Loss</option>
                    <option value="Exercise">Exercise</option>
                    <option value="Mental Health">Mental Health</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100" id="searchBtn">Search</button>
            </div>
        </div>

        <div class="row g-4" id="knowledgeList"></div>
        <nav class="mt-4" id="pagination"></nav>
    </div>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p class="mb-0"><i class="fas fa-leaf text-success"></i> HealthyEat &copy; 2024</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/knowledge.js"></script>
</body>
</html>
